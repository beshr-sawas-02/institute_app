name: institute_app
description: تطبيق إدارة المعهد - موظف الاستقبال
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # إدارة الحالة والتنقل
  get: ^4.6.6

  # الاتصال بالـ API
  dio: ^5.4.0

  # التخزين الآمن للـ Token
  flutter_secure_storage: ^9.0.0

  # التخزين المحلي البسيط
  shared_preferences: ^2.2.2

  # الأيقونات
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

  # التاريخ والوقت
  intl: ^0.19.0

  # مؤشر التحميل
  shimmer: ^3.0.0

  # Pull to refresh
  pull_to_refresh: ^2.0.0

  # Toast / Snackbar
  fluttertoast: ^8.2.4

  # الأنيميشن
  flutter_animate: ^4.3.0

  # Lottie للأنيميشن
  lottie: ^3.0.0

  # الصور
  cached_network_image: ^3.3.1

  # الـ Dropdown المتقدم
  dropdown_button2: ^2.3.9

  # Date Picker
  syncfusion_flutter_datepicker: ^24.1.41

  # Charts للتقارير
  fl_chart: ^0.66.2

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0

  # Permission Handler
  permission_handler: ^11.2.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # Gap / Spacing
  gap: ^3.0.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/school.png"
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700